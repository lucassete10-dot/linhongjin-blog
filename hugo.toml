baseURL = "https://linhongjin.top/"
languageCode = "zh-CN"
title = "Flora的学习笔记"
theme = "PaperMod"
defaultContentLanguage = "zh"
hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "Flora的学习笔记"
  description = "记录我的学习历程 — 编程、英语、读书与思考"
  keywords = ["学习笔记", "编程", "英语", "博客"]
  author = "Flora"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hello, welcome to Flora's channel"
    Content = "A space where I share my learning journey — coding notes, English study, book reflections, and more."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lucassete10-dot"

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"
    apple_touch_icon = "/favicon.svg"
    safari_pinned_tab = "/favicon.svg"

  [params.label]
    text = "Flora"

  # 文章封面图设置（每篇文章在 front matter 里写 cover.image 即可使用）
  [params.cover]
    hidden = false          # 全局是否隐藏封面
    hiddenInList = false    # 列表页是否隐藏
    hiddenInSingle = false  # 文章页是否隐藏
    responsiveImages = true
    linkFullImages = true

  # GoatCounter 访问统计：在 https://www.goatcounter.com 注册后，
  # 把你的站点代码填进 code（例如注册成 flora，就填 "flora"），统计才会生效
  [params.goatcounter]
    code = "flora"

  # Giscus 评论（基于 GitHub Discussions）
  # repoId / categoryId 需要在 https://giscus.app 生成后填入，填好评论区才会显示
  [params.giscus]
    repo = "lucassete10-dot/linhongjin-blog"
    repoId = "R_kgDOS_3W3Q"
    category = "Announcements"
    categoryId = "DIC_kwDOS_3W3c4C_4Zx"
    mapping = "pathname"
    theme = "preferred_color_scheme"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 15
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
